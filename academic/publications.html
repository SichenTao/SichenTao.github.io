    <meta charset="UTF-8" />

      name="description"
      content="Complete publications page for Sichen Tao, including filters, source grouping, and external records."
    />
    <link rel="canonical" href="https://sichentao.github.io/academic/publications.html" />
    <meta name="theme-color" content="#f5eee4" />
    <title>Publications | Sichen Tao</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/images/favicon-portrait.png" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/images/favicon-portrait.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <script>
      try {
        const savedTheme = localStorage.getItem("sichen-homepage-theme");
        if (savedTheme) {
          document.documentElement.dataset.theme = savedTheme;
        }
        const savedLocale = localStorage.getItem("sichen-homepage-locale");
        if (savedLocale) {
          document.documentElement.lang = savedLocale === "zh" ? "zh-CN" : savedLocale;
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260407-014723" />
    <script src="./data/profile-data.js?v=20260407-014723"></script>
    <script defer src="./app.js?v=20260407-014723"></script>
  </head>
  <body data-page="publications">
    <div class="page-wash"></div>
    <div class="page-grid"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>

    <header class="shell site-header">
      <div class="header-tools">
        <div class="header-controls-anchor" aria-hidden="true"></div>
        <div class="header-controls" aria-label="Display controls">
          <div class="locale-switcher control-switcher" role="group" aria-label="Language"></div>
          <div class="theme-switcher control-switcher" role="group" aria-label="Color theme"></div>
        </div>
        <nav class="topnav" aria-label="Page navigation">
          <a href="./index.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-home"></use></svg><span>Home</span></a>
          <a href="./profiles.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-profiles"></use></svg><span>Profiles</span></a>
          <a href="./publications.html" aria-current="page"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-publications"></use></svg><span>Publications</span></a>
          <a href="./awards.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-awards"></use></svg><span>Awards</span></a>
          <a href="./projects.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-projects"></use></svg><span>Projects</span></a>
          <a href="./service.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-service"></use></svg><span>Service</span></a>
          <a href="./timeline.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-timeline"></use></svg><span>Timeline</span></a>
          <a href="./research.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-research"></use></svg><span>Research</span></a>
          <a href="./sources.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-sources"></use></svg><span>Sources</span></a>
          <a href="./archive.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-archive"></use></svg><span>Archive</span></a>
        </nav>
      </div>
    </header>

    <main class="shell layout">
      <section class="panel section-card reveal">
        <div class="section-head publication-head">
          <div class="section-head-main">
            <div class="publication-title-lockup">
              <h2>Browse &amp; Filter</h2>
            </div>
            <div class="filter-search-row">
              <input id="pub-search" class="input" type="search" placeholder="Search title, author, venue, or tag" />
            </div>
          </div>
          <div class="filters publication-filters">
            <div class="filter-toolbar">
              <div class="filter-toolbar-label">
                <svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-filter"></use></svg>
                <span id="filter-toolbar-label">Filters</span>
              </div>
              <button id="pub-reset" class="button button-secondary filter-reset icon-only" type="button" aria-label="Reset" title="Reset">
                <svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-reset"></use></svg>
              </button>
              <div class="filter-control-row">
                <select id="year-filter" class="input"></select>
                <select id="type-filter" class="input"></select>
                <select id="status-filter" class="input"></select>
                <select id="venue-filter" class="input"></select>
                <select id="sort-filter" class="input">
                  <option value="recent">Sort by recent</option>
                  <option value="impact_factor">Sort by IF</option>
                  <option value="citations">Sort by citations</option>
                  <option value="title">Sort by title</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-chip-row">
          <div class="filter-chip-label">
            <svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-keyword"></use></svg>
            <span id="quick-filter-label">Tags</span>
          </div>
          <div class="chip-row" id="quick-filter-chips" aria-label="Quick publication filters"></div>
        </div>
        <div id="publication-list" class="publication-list"></div>
      </section>
    </main>

    <footer class="shell footer-shell reveal">
      <div class="footer-panel">
        <div>
          <p class="eyebrow">Resources</p>
        </div>
        <div class="footer-actions">
          <a class="button button-primary" href="./index.html"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-home"></use></svg><span>Back to homepage</span></a>
          <a class="button button-secondary" href="./assets/docs/CV_SichenTao.pdf"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#icon-file"></use></svg><span>Curriculum vitae</span></a>
        </div>
      </div>
    </footer>
  </body>
