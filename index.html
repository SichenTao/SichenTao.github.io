    <meta
      property="og:description"
      content="Open the personal homepage, Academic Frontier, and JSPS KAKENHI workspace from one unified research portal."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sichen Tao | Research Portal" />
    <meta
      name="twitter:description"
      content="Open the personal homepage, Academic Frontier, and JSPS KAKENHI workspace from one unified research portal."
    />
    <meta name="twitter:image" content="https://sichentao.github.io/academic/sichen_portal.png" />
    <title>Sichen Tao | Research Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400..700&family=Sora:wght@300..700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/academic/favicon.png" type="image/png" />
    <script>
      (function () {
        const themeCatalog = {
          tohoku: "#eee7f8",
          toyama: "#edf4f7",
          usst: "#f7eded",
        };
        try {
          const savedLocale = localStorage.getItem("sichen-homepage-locale");
          document.documentElement.lang =
            savedLocale === "zh" ? "zh-CN" : savedLocale === "ja" ? "ja" : "en";
          const savedTheme = localStorage.getItem("sichen-homepage-theme");
          const theme = themeCatalog[savedTheme] ? savedTheme : "tohoku";
          document.documentElement.dataset.theme = theme;
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute("content", themeCatalog[theme]);
          }
        } catch {
          document.documentElement.lang = "en";
          document.documentElement.dataset.theme = "tohoku";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/shared/homepage-shell.css?v=20260502-170226" />
    <link rel="stylesheet" href="/assets/shared/homepage-frame.css?v=20260502-170226" />
    <link rel="stylesheet" href="./portal.css?v=20260502-170226" />
    <script src="/assets/shared/homepage-i18n.js?v=20260502-170226"></script>
    <script src="/assets/shared/homepage-platform.js?v=20260502-170226"></script>
    <script src="/assets/shared/homepage-components.js?v=20260502-170226"></script>
    <script defer src="/assets/shared/homepage-shell.js?v=20260502-170226"></script>
    <script defer src="./portal.js?v=20260502-170226"></script>
  </head>
  <body data-page="portal">
    <div class="page-wash"></div>

    <header class="shell site-header">
      <div class="header-tools">
        <div class="header-controls-anchor" aria-hidden="true"></div>
        <div class="header-controls" aria-label="Display controls">
          <div class="locale-switcher control-switcher" role="group" aria-label="Language"></div>
          <div class="theme-switcher control-switcher" role="group" aria-label="Color theme"></div>
        </div>
        <nav class="topnav" id="portalTopnav" aria-label="Page navigation"></nav>
      </div>
    </header>

    <main class="shell layout">
      <section class="portal-hero reveal">
        <div class="portal-hero-copy">
          <p class="eyebrow" id="portalEyebrow"></p>
          <p class="native-name" id="portalNativeName"></p>
          <h1 id="portalTitle"></h1>
          <div class="hero-identity">
            <p class="eyebrow" id="portalRoleLabel"></p>
            <p class="hero-role" id="portalRole"></p>
            <p class="hero-affiliation" id="portalAffiliation"></p>
          </div>
          <p class="lede hero-description" id="portalDescription"></p>
        </div>
        <div class="portal-portrait-card">
          <img id="portalPortrait" src="/academic/assets/images/avatar-openai.jpg" alt="" />
        </div>
      </section>

      <section class="portal-directory reveal">
        <div class="section-head">
          <div class="section-head-main">
            <div>
              <p class="eyebrow" id="portalCardsKicker"></p>
              <h2 id="portalCardsTitle"></h2>
            </div>
            <p class="section-note" id="portalCardsLede"></p>
          </div>
        </div>
        <div class="portal-grid" id="portalGrid" aria-label=""></div>
      </section>
    </main>
  </body>
</html>
