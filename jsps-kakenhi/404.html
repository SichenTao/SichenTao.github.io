      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;500;600;700&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"

    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="manifest" href="./site.webmanifest" />
    <script>
      (function () {
        const themeCatalog = {
          tohoku: "#f3eef9",
          toyama: "#edf4f7",
          usst: "#f7eded",
        };
        try {
          const savedLocale =
            localStorage.getItem("sichen-homepage-locale") ||
            localStorage.getItem("kakenhi-portal-locale");
          document.documentElement.lang =
            savedLocale === "zh" ? "zh-CN" : savedLocale === "ja" ? "ja" : "en";
          const savedTheme =
            localStorage.getItem("sichen-homepage-theme") ||
            localStorage.getItem("kakenhi-portal-theme");
          const theme = themeCatalog[savedTheme] ? savedTheme : "tohoku";
          document.documentElement.dataset.theme = theme;
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute("content", themeCatalog[theme]);
          }
        } catch {
          document.documentElement.lang = "en";
          document.documentElement.dataset.theme = "tohoku";
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260406-171138" />
