window.ACADEMIC_FRONTIER_DEFAULT_LANGUAGE = "en";
window.ACADEMIC_FRONTIER_DEFAULT_THEME = "tohoku";
window.ACADEMIC_FRONTIER_LOCALE_HREFS = {"en": "./signals.html", "zh": "./zh/signals.html", "ja": "./ja/signals.html"};
(function() {
  var themeCatalog = {"tohoku": "#f3eef9", "toyama": "#edf4f7", "usst": "#f7eded"};
  var localeCatalog = window.ACADEMIC_FRONTIER_LOCALE_HREFS || {};
  var currentLocale = "en";
  var theme = "tohoku";
  try {
    var savedLocale = window.localStorage.getItem("sichen-homepage-locale") || window.localStorage.getItem("academic-frontier-language") || window.localStorage.getItem("学术前沿-language");
    if (savedLocale && localeCatalog[savedLocale] && savedLocale !== currentLocale) {
      var redirectUrl = new URL(localeCatalog[savedLocale], window.location.href);
      redirectUrl.search = window.location.search;
      redirectUrl.hash = window.location.hash;
      if (redirectUrl.pathname !== window.location.pathname) {
        window.location.replace(redirectUrl.toString());
        return;
      }
    }
    var queryTheme = new URLSearchParams(window.location.search).get("theme");
    if (queryTheme && themeCatalog[queryTheme]) {
      theme = queryTheme;
    } else {
      var savedTheme = window.localStorage.getItem("sichen-homepage-theme");
      if (savedTheme && themeCatalog[savedTheme]) {
        theme = savedTheme;
      }
    }
  } catch (error) {}
  document.documentElement.dataset.theme = theme;
  var themeColor = document.querySelector('meta[name="theme-color"]');
  if (themeColor) themeColor.setAttribute("content", themeCatalog[theme] || themeCatalog.tohoku);
  window.ACADEMIC_FRONTIER_DEFAULT_THEME = theme;
})();
</script>
