      theme = queryTheme;

        theme = savedTheme;
      }
    }
  } catch (error) {}
  document.documentElement.dataset.theme = theme;
  var themeColor = document.querySelector('meta[name="theme-color"]');
  if (themeColor) themeColor.setAttribute("content", themeCatalog[theme] || themeCatalog.tohoku);
  window.ACADEMIC_FRONTIER_DEFAULT_THEME = theme;
})();
</script>
