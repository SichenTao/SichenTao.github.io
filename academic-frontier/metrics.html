(function() {
  var themeCatalog = {"tohoku": "#f3eef9", "toyama": "#edf4f7", "usst": "#f7eded"};
  var theme = "tohoku";
  try {
    var queryTheme = new URLSearchParams(window.location.search).get("theme");
    if (queryTheme && themeCatalog[queryTheme]) {
      theme = queryTheme;
    } else {
      var savedTheme = window.localStorage.getItem("sichen-homepage-theme");
      if (savedTheme && themeCatalog[savedTheme]) {
        theme = savedTheme;
      }
    }
  } catch (error) {}
  document.documentElement.dataset.theme = theme;
  var themeColor = document.querySelector('meta[name="theme-color"]');
  if (themeColor) themeColor.setAttribute("content", themeCatalog[theme] || themeCatalog.tohoku);
  window.ACADEMIC_FRONTIER_DEFAULT_THEME = theme;
})();
</script>
